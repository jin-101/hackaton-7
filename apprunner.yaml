version: 1.0
runtime: python311
build:
  commands:
    pre-build:
      - pip install --upgrade pip
    build:
      - pip install -r backend/requirements.txt
    post-build:
      - PYTHONPATH=/app:/app/backend python backend/seed_data.py
run:
  command: uvicorn app.main:app --host 0.0.0.0 --port 8080
  network:
    port: 8080
  env:
    - name: PYTHONPATH
      value: /app/backend:/app
